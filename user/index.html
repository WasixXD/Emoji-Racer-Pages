<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bettor Profile</title>
  <style>
    :root { --bg:#101114; --panel:#181a20; --panel2:#20232b; --line:#30343f; --text:#f5f1e8; --muted:#a9adba; --hot:#ffbf3c; --green:#70e39b; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--bg); color:var(--text); font:15px/1.45 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    main { max-width: 900px; margin: 0 auto; padding: 22px 18px 56px; }
    a.back { display:inline-flex; align-items:center; gap:8px; color:var(--text); text-decoration:none; font-weight:800; margin-bottom:22px; }
    .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:22px; box-shadow:0 18px 50px rgba(0,0,0,.28); }
    h1 { margin:0; font-size: clamp(34px, 8vw, 68px); line-height:.95; }
    .muted { color:var(--muted); }
    .grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:14px; margin-top:20px; }
    .metric { background:var(--panel2); border:1px solid var(--line); border-radius:7px; padding:15px; }
    .metric span { color:var(--muted); display:block; font-size:12px; text-transform:uppercase; letter-spacing:.1em; margin-bottom:6px; }
    .metric b { font-size:22px; color:var(--hot); }
    .bet { margin-top:18px; background:var(--panel2); border:1px solid var(--line); border-radius:7px; padding:16px; }
    .emoji { font-size:42px; }
    @media (max-width: 650px) { .grid { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <main>
    <a class="back" href="../">← Back to dashboard</a>
    <section class="panel" id="profile">Loading...</section>
  </main>
  <script>
    const money = value => Number(value || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    const date = value => value ? new Date(value).toLocaleString('en-US') : 'Not available';
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    async function loadUser() {
      const response = await fetch('../all_data.json', { cache: 'no-store' });
      const data = await response.json();
      const user = (data.users || []).find(item => item.tiktok_id === id);
      const profile = document.getElementById('profile');
      if (!user) {
        profile.innerHTML = '<h1>User not found</h1><p class="muted">The selected TikTok user is not present in all_data.json.</p>';
        return;
      }
      const bet = user.next_bet || {};
      profile.innerHTML = `
        <div class="muted">TikTok nickname</div>
        <h1>${user.nickname || 'Unknown bettor'}</h1>
        <p class="muted">${user.tiktok_id}</p>
        <div class="grid">
          <div class="metric"><span>Current balance</span><b>$${money(user.balance)}</b></div>
          <div class="metric"><span>First race date</span><b style="font-size:17px">${date(user.created_at)}</b></div>
        </div>
        <div class="bet">
          <div class="muted">Next race bet</div>
          ${bet.id ? `
            <div class="emoji">${bet.emoji}</div>
            <h2>$${money(bet.amount)} on ${bet.emoji}</h2>
            <p class="muted">Race: ${bet.race_id || 'Current race'} · Odds: ${bet.decimal_odds ? money(bet.decimal_odds) + 'x' : 'Not available'} · Potential payout: $${money(bet.potential_payout)}</p>
          ` : '<p class="muted">This user has no bet on the current race.</p>'}
        </div>
      `;
    }
    loadUser().catch(error => {
      document.getElementById('profile').textContent = 'Could not load all_data.json';
      console.error(error);
    });
  </script>
</body>
</html>
